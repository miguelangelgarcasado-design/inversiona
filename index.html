<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InversiónIA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a5cff">
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(180deg,#08102a,#0b1220);
      color:white;
    }
    header{
      background:#0a5cff;
      padding:18px;
      text-align:center;
      font-size:28px;
      font-weight:bold;
    }
    .wrap{
      padding:20px;
      max-width:900px;
      margin:auto;
    }
    .card{
      background:#0f1b3a;
      border-radius:14px;
      padding:20px;
      margin:16px 0;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
    }
    h2{
      margin-top:0;
      color:#7fb3ff;
    }
    p{
      margin:8px 0 0;
      color:#dbe7ff;
    }
  </style>
</head>
<body>
  <header>InversiónIA</header>

  <div class="wrap">
    <div class="card">
      <h2>Noticias</h2>
      <p>Mercados atentos a tipos de interés y resultados empresariales.</p>
    </div>

    <div class="card">
      <h2>Alertas</h2>
      <p>Aquí aparecerán tus alertas de compra y venta.</p>
    </div>

    <div class="card">
      <h2>Cartera</h2>
      <p>Panel para controlar tus posiciones y seguimiento.</p>
    </div>

    <div class="card">
      <h2>Gráficas</h2>
      <p>Visualización simple de evolución y tendencias.</p>
    </div>
  </div>
<script>
async function cargarDatos() {
  const activos = [
    { nombre: "Indra", ticker: "IDR.MC" },
    { nombre: "Repsol", ticker: "REP.MC" },
    { nombre: "Tesla", ticker: "TSLA" },
    { nombre: "Apple", ticker: "AAPL" },
    { nombre: "Bitcoin", ticker: "BTC-USD" }
  ];

  const contenedor = document.querySelector(".wrap");

  const bloque = document.createElement("div");
  bloque.className = "card";
  bloque.innerHTML = "<h2>📊 Cartera en tiempo real</h2>";

  contenedor.appendChild(bloque);
try {
  const res = await fetch('/.netlify/functions/prices');
  const data = await res.json();

 data.forEach(function(item) {
  let precio = item.price;

  if (precio === null || precio === undefined || precio === "N/A") {
    precio = "—";
  } else {
    precio = Number(precio).toLocaleString("es-ES", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  let nombre = item.symbol;

  if (item.symbol === "SOL.MC") nombre = "Solaria";
  if (item.symbol === "REP.MC") nombre = "Repsol";
  if (item.symbol === "ENG.MC") nombre = "Enagás";
  if (item.symbol === "IDR.MC") nombre = "Indra";
  if (item.symbol === "AMP.MC") nombre = "Amper";
  if (item.symbol === "NAK") nombre = "Northern Dynasty";
  if (item.symbol === "ETH-USD") nombre = "Ethereum";
  if (item.symbol === "BTC-USD") nombre = "Bitcoin";

  bloque.innerHTML += `
    <div style="padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.08);">
      <strong>${nombre}</strong> <span style="opacity:0.7;">(${item.symbol})</span><br>
      <span style="color:#7dd3fc;">${precio}</span>
    </div>
  `;
});

} catch (e) {
  bloque.innerHTML += '<p>Error cargando datos</p>';
}
}

cargarDatos();
</script>
